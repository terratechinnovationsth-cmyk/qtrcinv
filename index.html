<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>TTI Cloud System</title>
<link href="" rel="stylesheet">
<style>
body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; }
.main-header { background: #198754; color: white; padding: 20px; text-align: center; }
.a4-page { width: 210mm; height: 297mm; background: white; margin: 20px auto; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
.f-client { position: absolute; top: 146px; left: 47px; width: 450px; display: flex; flex-direction: column; gap: 2px; }
#outCustName { font-weight: bold; font-size: 14px; }
#outCustAddr, #outCustTax { font-size: 12px; }
.data-field { position: absolute; z-index: 10; }
@media print { .no-print { display: none !important; } .a4-page { margin: 0; } }
</style>

ส่วนที่ 2 (ก๊อปปี้ข้อความด้านล่างนี้ไปจนถึงคำว่า /div)
<body>
<div class="main-header no-print">
<h2>TERRA TECH INNOVATIONS</h2>
<p>Cloud Database System</p>
</div>
<div class="container mt-4 no-print">
<div class="card p-3 mb-3">
<input type="text" id="inDate" class="form-control mb-2" placeholder="วันที่" oninput="updatePreview()">
<input type="text" id="inNo" class="form-control mb-2" placeholder="เลขที่เอกสาร" oninput="updatePreview()">
<input type="text" id="custName" class="form-control mb-2" placeholder="ชื่อลูกค้า" oninput="updatePreview()">
<input type="text" id="custAddr" class="form-control mb-2" placeholder="ที่อยู่ลูกค้า" oninput="updatePreview()">
<input type="text" id="custTax" class="form-control mb-2" placeholder="เลขผู้เสียภาษี" oninput="updatePreview()">
<div id="itemRows"></div>
<button class="btn btn-success mt-2" onclick="addRow()">+ เพิ่มรายการ</button>
<button id="btnSave" class="btn btn-primary mt-2 w-100" onclick="saveData()">💾 บันทึกลง Google Sheets</button>
</div>
<div class="card p-3"><table class="table"><thead><tr><th>เลขที่</th><th>ลูกค้า</th><th>ยอดเงิน</th></tr></thead><tbody id="historyTable"></tbody></table></div>
</div>
<div class="a4-page">
<div class="f-client">
<div id="outCustName"></div>
<div id="outCustAddr"></div>
<div id="outCustTax"></div>
</div>
<div class="data-field" id="outDate" style="top: 146px; left: 585px;"></div>
<div class="data-field" id="outNo" style="top: 171px; left: 585px;"></div>
<div class="data-field" id="outGrandTotal" style="top: 787px; left: 650px; font-weight: bold;">0.00</div>
<div class="data-field" id="outTotalThai" style="top: 787px; left: 100px;">(ศูนย์บาทถ้วน)</div>
</div>

ส่วนที่ 3 (ส่วนของ JavaScript สำคัญมาก)
<script>
const SCRIPT_URL = "";

function updatePreview() {
document.getElementById('outCustName').innerText = document.getElementById('custName').value;
document.getElementById('outCustAddr').innerText = document.getElementById('custAddr').value;
document.getElementById('outCustTax').innerText = "เลขประจำตัวผู้เสียภาษี: " + document.getElementById('custTax').value;
document.getElementById('outDate').innerText = document.getElementById('inDate').value;
document.getElementById('outNo').innerText = document.getElementById('inNo').value;
}

function addRow() {
const div = document.createElement('div');
div.className = 'd-flex gap-2 mb-2 item-row';
div.innerHTML = '<input type="text" class="form-control in-desc" placeholder="รายการ"><input type="number" class="form-control in-price" value="0" oninput="updateTotal()">';
document.getElementById('itemRows').appendChild(div);
}

function updateTotal() {
let total = 0;
document.querySelectorAll('.in-price').forEach(el => total += parseFloat(el.value || 0));
document.getElementById('outGrandTotal').innerText = total.toLocaleString();
}

async function saveData() {
const btn = document.getElementById('btnSave');
btn.innerText = "⏳ กำลังบันทึก...";
const data = {
docDate: document.getElementById('inDate').value,
docNo: document.getElementById('inNo').value,
custName: document.getElementById('custName').value,
grandTotal: document.getElementById('outGrandTotal').innerText
};
try {
await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
alert("บันทึกเรียบร้อย!");
loadData();
} catch(e) { alert("ล้มเหลว"); }
btn.innerText = "💾 บันทึกลง Google Sheets";
}

async function loadData() {
try {
const res = await fetch(SCRIPT_URL);
const db = await res.json();
document.getElementById('historyTable').innerHTML = db.map(r => &lt;tr&gt;&lt;td&gt;${r.docNo}&lt;/td&gt;&lt;td&gt;${r.custName}&lt;/td&gt;&lt;td&gt;${r.grandTotal}&lt;/td&gt;&lt;/tr&gt;).join('');
} catch(e) {}
}

window.onload = () => { addRow(); loadData(); };
</script>

</body>
</html>
