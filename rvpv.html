<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraTech Innovations - Automatic Ledger v23</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .main-card { border-radius: 24px; border: none; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); background: #fff; overflow: hidden; margin-top: 2rem; }
        .brand-header { background: #0f172a; color: #f8fafc; padding: 40px 20px; }
        .drop-zone { border: 2px dashed #3b82f6; border-radius: 20px; padding: 60px 20px; cursor: pointer; transition: 0.3s; background: #f1f5f9; text-align: center; }
        .drop-zone:hover { background: #eff6ff; border-color: #2563eb; }
        .data-input { background-color: #f1f5f9 !important; font-weight: 600; color: #2563eb; border: 1px solid #cbd5e1; }
        #loader { display: none; }
        .status-pill { padding: 8px 20px; border-radius: 9999px; font-size: 0.9rem; font-weight: 600; display: inline-block; }
        .table-container { background: #fff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; margin-top: 2rem; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="main-card mb-4">
        <div class="brand-header text-center">
            <h2 class="fw-bold mb-1">TerraTech Innovations Co., Ltd.</h2>
            <p class="mb-0 opacity-75">Cloud Ledger System v23 (Thunder API v2 Bank Verify)</p>
        </div>

        <div class="card-body p-4 p-md-5">
            <div class="row g-4">
                <div class="col-md-5 text-center">
                    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                        <div id="prompt">
                            <i class="mb-3 d-block fs-1">📷</i>
                            <h6 class="fw-bold">อัปโหลดสลิป</h6>
                            <p class="small text-muted mb-0">ดึงข้อมูลผ่าน Thunder Bank API</p>
                        </div>
                        <img id="preview" class="img-fluid rounded d-none" style="max-height: 250px;">
                        <input type="file" id="fileInput" hidden accept="image/*">
                    </div>

                    <div id="loader" class="mt-4">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="small mt-2 fw-bold text-primary">กำลังตรวจสอบสลิปกับระบบธนาคาร...</p>
                    </div>

                    <div id="statusUI" class="mt-4 d-none">
                        <span id="statusLabel" class="status-pill"></span>
                    </div>
                </div>

                <div class="col-md-7 border-start ps-md-4">
                    <form id="accountingForm" class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">รหัสอ้างอิง (TransRef)</label>
                            <input type="text" id="transRef" class="form-control data-input" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">วันที่ธุรกรรม</label>
                            <input type="text" id="dateInput" class="form-control data-input" readonly placeholder="ดึงจาก QR อัตโนมัติ">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">ยอดเงินสุทธิ</label>
                            <input type="number" id="amountInput" class="form-control data-input fw-bold" readonly step="0.01">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">ผู้โอน (Sender)</label>
                            <input type="text" id="senderInput" class="form-control data-input" readonly>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">ผู้รับ (Receiver)</label>
                            <input type="text" id="receiverInput" class="form-control data-input" readonly>
                        </div>
                        
                        <div class="col-12 text-end pt-3">
                            <button type="button" class="btn btn-link text-muted text-decoration-none" onclick="location.reload()">ล้างข้อมูล</button>
                            <button type="submit" id="saveBtn" class="btn btn-primary btn-lg px-5 shadow fw-bold" disabled>บันทึกลงบัญชี</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="table-container mb-5">
        <table class="table table-hover align-middle mb-0 text-center">
            <thead class="table-dark">
                <tr>
                    <th>Ref No.</th>
                    <th>ผู้โอน -> ผู้รับ</th>
                    <th class="pe-4 text-end">ยอดเงิน</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // การตั้งค่าตาม CURL ที่คุณให้มา
    const API_URL = 'https://api.thunder.in.th/v2/verify/bank'; 
    const API_KEY = "44187dbd-e676-4c3a-bcf6-8cdf38622f3e";
    let db = JSON.parse(localStorage.getItem('terra_v23')) || [];

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('preview').src = URL.createObjectURL(file);
        document.getElementById('preview').classList.remove('d-none');
        document.getElementById('prompt').classList.add('d-none');
        document.getElementById('loader').style.display = 'block';
        document.getElementById('statusUI').classList.add('d-none');

        const reader = new FileReader();
        reader.onload = function() {
            const img = new Image();
            img.onload = async function() {
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0, img.width, img.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                
                if (code) {
                    await callThunderBankAPI(code.data);
                } else {
                    updateStatus("❌ ไม่พบ QR Code ในสลิป", "bg-danger text-white");
                    document.getElementById('loader').style.display = 'none';
                }
            };
            img.src = reader.result;
        };
        reader.readAsDataURL(file);
    });

    async function callThunderBankAPI(payload) {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({ payload: payload }) // ใช้ payload ตาม CURL
            });

            if (!response.ok) {
                const errorDetail = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorDetail}`);
            }

            const res = await response.json();

            if (res.success) {
                const data = res.data;
                
                // แมปข้อมูลตามโครงสร้าง JSON ที่คุณให้มา
                document.getElementById('transRef').value = data.transRef;
                document.getElementById('amountInput').value = data.amount.amount;
                document.getElementById('senderInput').value = `${data.sender.bank.short} - ${data.sender.account.name.th}`;
                document.getElementById('receiverInput').value = `${data.receiver.bank.short} - ${data.receiver.account.name.th}`;
                
                // วันที่: พยายามดึงจาก transRef หรือใช้เวลาปัจจุบันหาก API ไม่ส่งมาตรงๆ
                const now = new Date();
                document.getElementById('dateInput').value = now.toLocaleDateString('th-TH');
                
                document.getElementById('saveBtn').disabled = false;
                updateStatus("✅ ตรวจสอบผ่านระบบธนาคารสำเร็จ", "bg-success text-white");
            } else {
                updateStatus(`❌ API Error: ${res.message || 'ข้อมูลไม่ถูกต้อง'}`, "bg-danger text-white");
            }
        } catch (err) {
            console.error("Fetch Error:", err);
            updateStatus(`❌ ล้มเหลว: ${err.message}`, "bg-danger text-white");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function updateStatus(text, className) {
        const label = document.getElementById('statusLabel');
        label.innerText = text;
        label.className = "status-pill " + className;
        document.getElementById('statusUI').classList.remove('d-none');
    }

    document.getElementById('accountingForm').onsubmit = (e) => {
        e.preventDefault();
        const entry = {
            ref: document.getElementById('transRef').value,
            amount: document.getElementById('amountInput').value,
            sender: document.getElementById('senderInput').value,
            receiver: document.getElementById('receiverInput').value,
            date: document.getElementById('dateInput').value
        };
        db.push(entry);
        localStorage.setItem('terra_v23', JSON.stringify(db));
        alert("บันทึกบัญชี TerraTech เรียบร้อย!");
        location.reload();
    };

    function renderTable() {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        db.reverse().forEach(item => {
            body.innerHTML += `
                <tr>
                    <td class="ps-4 small">${item.ref}</td>
                    <td><small><b>จาก:</b> ${item.sender}</small><br><small><b>ถึง:</b> ${item.receiver}</small></td>
                    <td class="text-end pe-4 fw-bold text-primary">${parseFloat(item.amount).toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                </tr>`;
        });
    }
    renderTable();
</script>
</body>
</html>
